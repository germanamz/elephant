name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Validate commit messages
        run: |
          go install github.com/siderolabs/conform/cmd/conform@latest
          conform enforce

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Run unit tests
        run: go test -race ./internal/... ./cmd/...

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Pull test images
        run: docker pull alpine:latest

      - name: Run integration tests
        run: go test -race -tags integration ./internal/...

  branch-name:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract types from conform config
        id: types
        run: |
          types=$(sed -n '/conventional:/,/scopes:/p' .conform.yaml | grep '^ *- ' | sed 's/^ *- //' | paste -sd '|' -)
          echo "pattern=^($types)/[a-z0-9]+(-[a-z0-9]+)*$" >> "$GITHUB_OUTPUT"

      - name: Validate branch name
        run: |
          branch="${{ github.head_ref }}"
          pattern="${{ steps.types.outputs.pattern }}"
          if ! echo "$branch" | grep -qE "$pattern"; then
            echo "::error::Branch name '$branch' does not match required pattern: <type>/<kebab-case-description>"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo "Example: feat/add-filters, fix/null-pointer"
            exit 1
          fi

  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract types from conform config
        id: types
        run: |
          types=$(sed -n '/conventional:/,/scopes:/p' .conform.yaml | grep '^ *- ' | sed 's/^ *- //')
          echo "types<<EOF" >> "$GITHUB_OUTPUT"
          echo "$types" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: ${{ steps.types.outputs.types }}
