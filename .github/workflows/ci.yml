name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Run unit tests
        run: go test -race ./internal/... ./cmd/...

      - name: Run integration tests
        run: go test -race -tags integration ./internal/...

      - name: Validate commit messages
        run: |
          go install github.com/siderolabs/conform/cmd/conform@latest
          conform enforce

  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract types from conform config
        id: types
        run: |
          types=$(sed -n '/conventional:/,/scopes:/p' .conform.yaml | grep '^ *- ' | sed 's/^ *- //')
          echo "types<<EOF" >> "$GITHUB_OUTPUT"
          echo "$types" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: ${{ steps.types.outputs.types }}
